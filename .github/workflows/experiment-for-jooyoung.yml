name: Producer-Consumer Experiment

on:
  push:
    branches:
      - ypwong99/experiment-for-jooyoung

jobs:
  experiment:
    runs-on: [ self-hosted, aws ]
    steps:
      - name: Set up Go 1.21
        uses: actions/setup-go@v3
        with:
          go-version: 1.21

      - name: Configure AWS credentials using EASE lab account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-west-1

      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
        with:
          ref: ypwong99/experiment-for-jooyoung

      - name: Run experiment
        run: cd src && go run . -l debug -c ../experiments/data-transfer/storage/aws-s3/experiment-jooyoung.json

      - uses: actions/upload-artifact@v4
        with:
          name: results
          path: src/latency-samples
